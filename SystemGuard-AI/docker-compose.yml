version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: systemguard-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: systemguard

  backend:
    build: ./backend
    container_name: systemguard-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/systemguard
      JWT_SECRET: change_this_in_production
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      FRONTEND_URL: http://localhost:5173
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build: ./frontend
    container_name: systemguard-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000
      VITE_SOCKET_URL: http://localhost:5000

volumes:
  mongo_data:
